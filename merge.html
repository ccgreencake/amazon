<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel 表格合并工具</title>
  <style>
    /* 页面基础样式 */
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
    }
    h1 {
      background-color: #4CAF50;
      color: white;
      margin: 0;
      padding: 20px 0;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    input[type="file"], input[type="checkbox"] {
      margin: 20px 0;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      color: white;
      background-color: #4CAF50;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #45a049;
    }
    #status {
      margin: 20px 0;
      font-size: 16px;
      font-weight: bold;
    }
    a {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #4CAF50;
      text-decoration: underline;
      cursor: pointer;
    }
    a:hover {
      color: #388e3c;
    }
  </style>
</head>
<body>
  <h1>Excel 表格合并工具</h1>
  <div class="container">
    <input type="file" id="folderInput" webkitdirectory directory multiple />
    <br>
    <label for="addTimeColumn">添加时间列:</label>
    <input type="checkbox" id="addTimeColumn" checked />
    <br>
    <button id="mergeButton">合成表格</button>
    <p id="status"></p>
    <a id="downloadLink">下载合并后的表格</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    document.getElementById("mergeButton").addEventListener("click", async () => {
      const folderInput = document.getElementById("folderInput");
      const files = folderInput.files;
      const addTimeColumn = document.getElementById("addTimeColumn").checked;

      // 检查用户是否选择了文件夹
      if (!files.length) {
        alert("请先上传文件夹！");
        return;
      }

      const status = document.getElementById("status");
      status.textContent = "正在合并表格，请稍候...";

      // 存储所有文件的 Sheet 数据
      let mergedData = [];
      let headersAdded = false; // 标记是否已经添加表头

      // 遍历文件夹中的所有文件
      for (const file of files) {
        if (file.name.endsWith(".xlsx")) {
          const arrayBuffer = await file.arrayBuffer();
          const workbook = XLSX.read(arrayBuffer, { type: "array" });

          // 假设每个文件只读取第一个 Sheet
          const firstSheetName = workbook.SheetNames[0];
          const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { header: 1 });

          // 提取文件名的第6到第11个字符作为时间信息
          const timeInfo = file.name.slice(5, 11);

          // 在每一行数据的开头添加时间列
          if (addTimeColumn) {
            sheetData.forEach((row, index) => {
              if (index === 0) {
                // 添加表头
                row.unshift("时间列");
              } else {
                // 添加时间列内容
                row.unshift(timeInfo);
              }
            });
          }

          // 如果是第一个文件，保留完整数据（包括表头）
          if (!headersAdded) {
            mergedData = sheetData;
            headersAdded = true;
          } else {
            // 后续文件跳过表头，只追加表体数据
            mergedData.push(...sheetData.slice(1));
          }
        }
      }

      if (mergedData.length === 0) {
        status.textContent = "未找到任何 .xlsx 文件！";
        return;
      }

      // 将合并后的数据转换为新的工作簿
      const newWorkbook = XLSX.utils.book_new();
      const newWorksheet = XLSX.utils.aoa_to_sheet(mergedData);
      XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "Merged Data");

      // 导出为文件
      const wbout = XLSX.write(newWorkbook, { bookType: "xlsx", type: "array" });
      const blob = new Blob([wbout], { type: "application/octet-stream" });
      const url = URL.createObjectURL(blob);

      // 创建下载链接
      const downloadLink = document.getElementById("downloadLink");
      downloadLink.href = url;
      downloadLink.download = "merged_file.xlsx";
      downloadLink.style.display = "inline";
      downloadLink.textContent = "点击下载合并后的表格";

      status.textContent = "表格合并完成！";
    });
  </script>
</body>
</html>
