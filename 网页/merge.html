<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel 表格合并工具</title>
  <style>
    /* 页面基础样式，同你原来 */
    body {font-family: Arial;margin:0;padding:0;background:#f4f4f9;color:#333;}
    h1 {background:#4CAF50;color:white;margin:0;padding:20px 0;text-align:center;}
    .container {max-width:600px;margin:30px auto;padding:20px;background:white;border-radius:8px;box-shadow:0 4px 8px rgba(0,0,0,0.2);text-align:center;}
    input[type="file"], input[type="checkbox"] {margin:20px 0;padding:10px;font-size:16px;border:1px solid #ddd;border-radius:4px;}
    button {padding:10px 20px;font-size:18px;color:white;background:#4CAF50;border:none;border-radius:4px;cursor:pointer;margin-top:10px;transition:background 0.3s;}
    button:hover {background:#45a049;}
    #status {margin:20px 0;font-size:16px;font-weight:bold;}
    a {display:none;margin-top:20px;font-size:18px;color:#4CAF50;text-decoration:underline;cursor:pointer;}
    a:hover {color:#388e3c;}
  </style>
</head>
<body>
  <h1>Excel 表格合并工具</h1>
  <div class="container">
    <input type="file" id="folderInput" webkitdirectory directory multiple />
    <br>
    <label for="addTimeColumn">添加时间列:</label>
    <input type="checkbox" id="addTimeColumn" checked />
    <br>
    <button id="mergeButton">合成表格</button>
    <p id="status"></p>
    <a id="downloadLink">下载合并后的表格</a>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    // 辅助异步读取单文件
    async function readExcelFile(file) {
      const arrayBuffer = await file.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const data = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], { header: 1 });
      return data;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    document.getElementById('mergeButton').addEventListener('click', async () => {
      const folderInput = document.getElementById('folderInput');
      const files = Array.from(folderInput.files).filter(f => /\.xlsx$/i.test(f.name));
      const addTimeColumn = document.getElementById('addTimeColumn').checked;
      const status = document.getElementById('status');
      const downloadLink = document.getElementById('downloadLink');

      downloadLink.style.display = 'none';
      status.textContent = '';

      if (!files.length) {
        alert('请先上传文件夹！');
        return;
      }

      status.textContent = '正在合并表格，请稍候...(0/' + files.length + ')';

      let mergedData = [];
      let headersAdded = false;

      // 分批处理避免内存瞬时过高
      const batchSize = 5; // 可调，数值越大速度越快但越易OOM;太小则速度慢
      for (let i = 0; i < files.length; i += batchSize) {
        const batch = files.slice(i, i + batchSize);

        // 使用Promise.all并发处理一批
        const batchResults = await Promise.all(batch.map(async file => {
          let data = await readExcelFile(file);

          // 获取时间信息
          const baseName = file.name.replace(/\.xlsx$/i, '');
          const timeInfo = baseName.slice(-6);

          // 如果要加时间列
          if (addTimeColumn) {
            data.forEach((row, idx) => {
              if (idx === 0) {
                row.unshift("时间列");
              } else {
                row.unshift(timeInfo);
              }
            });
          }
          return data;
        }));

        // 合并
        for (let j = 0; j < batchResults.length; ++j) {
          let data = batchResults[j];
          if (!headersAdded) {
            mergedData = data;
            headersAdded = true;
          } else {
            mergedData.push(...data.slice(1));
          }
        }

        // 每处理完一批，UI刷新
        status.textContent = `正在合并表格，请稍候...(${Math.min(i + batch.length, files.length)}/${files.length})`;
        await sleep(20); // 让UI有时间刷新
      }

      if (!mergedData.length) {
        status.textContent = "未找到任何 .xlsx 文件！";
        return;
      }

      status.textContent = '正在生成Excel文件...';

      // 生成
      setTimeout(() => {
        try {
          const newWorkbook = XLSX.utils.book_new();
          const newWorksheet = XLSX.utils.aoa_to_sheet(mergedData);
          XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "Merged Data");
          const wbout = XLSX.write(newWorkbook, { bookType: "xlsx", type: "array" });
          const blob = new Blob([wbout], { type: "application/octet-stream" });
          const url = URL.createObjectURL(blob);

          downloadLink.href = url;
          downloadLink.download = "merged_file.xlsx";
          downloadLink.style.display = "inline";
          downloadLink.textContent = "点击下载合并后的表格";

          status.textContent = "表格合并完成！";
        } catch (e) {
          status.textContent = "生成Excel时发生异常：" + e.message;
        }
      }, 50);
    });
  </script>
</body>
</html>
