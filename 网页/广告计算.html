<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>广告计算</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #333;
    }

    .container {
      background: #fff;
      padding: 30px 50px 40px 50px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      width: 750px;
      max-width: 100%;
      text-align: center;
    }

    h1 { margin-top: 0; margin-bottom: 18px; color: #222; font-weight: 700; font-size: 28px; }

    p.tip { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.5; min-height: 40px; }

    label { font-weight: 600; font-size: 15px; display: block; margin-bottom: 8px; color: #444; text-align: left; }

    .radio-group { margin-bottom: 20px; text-align: left; display: flex; justify-content: space-around; }

    .radio-group label { font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }

    input[type="radio"] { accent-color: #007BFF; cursor: pointer; width: 18px; height: 18px; }

    input[type="file"] { display: block; margin: 0 auto 30px auto; cursor: pointer; font-size: 15px; color: #555; }

    .btn-group { display: flex; flex-direction: column; gap: 10px; }

    button {
      border: none;
      color: white;
      padding: 12px 30px;
      border-radius: 7px;
      cursor: pointer;
      font-weight: 600;
      font-size: 17px;
      width: 100%;
      transition: all 0.3s ease;
    }

    #processBtn { background-color: #007BFF; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3); }
    #processBtn:hover { background-color: #0056b3; }

    #downloadBtn {
      background-color: #28a745;
      box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
      display: none;
    }
    #downloadBtn:hover { background-color: #218838; }

    .result { margin-top: 30px; font-size: 17px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; font-size: 14px; table-layout: fixed; }
    th, td { border: 1px solid #ddd; padding: 12px 8px; text-align: center; }
    th { background-color: #007BFF; color: white; }
    tr:nth-child(even) { background-color: #f9faff; }

    @media (max-width: 720px) { .container { width: 100%; } }
  </style>
</head>
<body>

  <div class="container">
    <p class="tip">请将广告活动名字末尾加上实际运费，比如 “男束腿卫裤-XXX-4.99”</p>
    <h1>广告计算</h1>

    <form id="uploadForm">
      <label>选择索引类型：</label>
      <div class="radio-group">
        <label><input type="radio" name="indexType" value="old" /> 老索引 (旧列名)</label>
        <label><input type="radio" name="indexType" value="new" checked /> 新索引 (新列名)</label>
      </div>

      <input type="file" id="csvFile" accept=".csv" />

      <div class="btn-group">
        <button type="button" id="processBtn">上传并计算</button>
        <button type="button" id="downloadBtn">下载计算结果表格</button>
      </div>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileInput = document.getElementById('csvFile');
    const resultDiv = document.getElementById('result');
    const uploadForm = document.getElementById("uploadForm");

    let currentResultData = null;
    let originalFileName = "result"; // 默认文件名

    function parseCurrencyNumber(str) {
      if (!str) return NaN;
      let s = str.trim().replace(/US\$|，|,/gi, '');
      let match = s.match(/-?[\d\.]+/);
      if (!match) return NaN;
      return parseFloat(match[0]);
    }

    function processCSV() {
      resultDiv.innerHTML = "";
      downloadBtn.style.display = "none";

      if (!fileInput.files.length) { alert("请先上传一个 CSV 文件！"); return; }

      const file = fileInput.files[0];
      // 获取原始文件名并去掉扩展名
      originalFileName = file.name.replace(/\.[^/.]+$/, "");

      const reader = new FileReader();
      const indexType = uploadForm.indexType.value;

      reader.onload = function (event) {
        const text = event.target.result;
        const rows = text.trim().split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

        if (rows.length < 2) { alert("CSV 文件内容无效！"); return; }

        let headers = rows[0].map(h => h.trim().replace(/^"|"$/g, ''));
        let colMap = indexType === "new" ?
          { activity: "广告活动名称", order: "购买量", sales: "销售额", spend: "总成本" } :
          { activity: "广告活动", order: "订单", sales: "销售额(USD)", spend: "花费(USD)" };

        const indices = [colMap.activity, colMap.order, colMap.sales, colMap.spend].map(col => headers.indexOf(col));
        if (indices.includes(-1)) {
          resultDiv.innerHTML = `<div style="color:red; font-weight:bold;">CSV 列名不匹配，请检查选择的“索引类型”。</div>`;
          return;
        }

        const [idxActivity, idxOrder, idxSales, idxSpend] = indices;
        let tAdOrder = 0, tSales = 0, tSpend = 0, tOrder = 0;

        rows.slice(1).forEach(row => {
          if (row.length <= Math.max(...indices)) return;
          const rawActivity = row[idxActivity].replace(/^"|"$/g, '').trim();
          const orderVal = parseFloat(row[idxOrder].replace(/^"|"$/g, '')) || 0;

          let shipping = 0;
          const numMatch = rawActivity.slice(-6).match(/[\d]+\.?[\d]*/);
          if (numMatch) shipping = parseFloat(numMatch[0]);

          tAdOrder += shipping * orderVal;
          tOrder += orderVal;
          tSales += parseCurrencyNumber(row[idxSales]) || 0;
          tSpend += parseCurrencyNumber(row[idxSpend]) || 0;
        });

        const totalOutput = (tAdOrder + tSales).toFixed(2);
        const acos = (tSpend / (parseFloat(totalOutput) || 1) * 100).toFixed(2);
        const fakeAcos = (tSpend / (tSales || 1) * 100).toFixed(2);

        currentResultData = {
          spend: tSpend.toFixed(2),
          orders: tOrder,
          output: totalOutput,
          fakeAcos: fakeAcos + "%",
          shipping: tAdOrder.toFixed(2),
          sales: tSales.toFixed(2),
          realAcos: acos + "%"
        };

        resultDiv.innerHTML = `
          <table>
            <thead><tr><th>广告花费</th><th>购买量</th><th>广告产出</th><th>实际ACOS (%)</th></tr></thead>
            <tbody><tr>
              <td>${currentResultData.spend}</td>
              <td>${currentResultData.orders}</td>
              <td>${currentResultData.output}</td>
              <td style="font-weight:bold; color:#007BFF;">${currentResultData.realAcos}</td>
            </tr></tbody>
          </table>`;
        downloadBtn.style.display = "block";
      };
      reader.readAsText(file, "UTF-8");
    }

    // 下载执行逻辑
    downloadBtn.addEventListener("click", () => {
      if (!currentResultData) return;

      const headers = ["广告花费", "购买量", "广告产出", "假ACOS (%)", "运费总金额", "销售额总金额", "实际ACOS (%)"];
      const values = [
        currentResultData.spend, currentResultData.orders, currentResultData.output,
        currentResultData.fakeAcos, currentResultData.shipping, currentResultData.sales, currentResultData.realAcos
      ];

      // 添加 BOM 确保 Excel 打开不乱码
      let csvContent = "\uFEFF" + headers.join(",") + "\n" + values.join(",") + "\n";
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      // 设置下载文件名：原文件名 + 处理结果
      const finalFileName = `${originalFileName}处理结果.csv`;

      link.setAttribute("href", url);
      link.setAttribute("download", finalFileName);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });

    processBtn.addEventListener("click", processCSV);
  </script>
</body>
</html>
