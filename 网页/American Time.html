<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旧金山实时时间</title>
    <style>
        /* 添加CSS样式 */
        body {
            /* 使用flexbox居中内容 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 使用视口高度来居中内容 */
            margin: 0; /* 移除默认的外边距 */
            font-family: Arial, sans-serif; /* 设置字体 */
        }
        #time {
            /* 放大字体大小，这里设置为3em，即当前字体大小的3倍 */
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1 style="font-size: 3em">旧金山实时时间</h1>
    <div id="time"></div> <!-- 旧金山的时间将在这里显示 -->
    <script>
        function updateSanFranciscoTime() {
            let currentTime = new Date();
            currentTime.setHours(currentTime.getHours() - 15); // 减去15小时

            let year = currentTime.getFullYear();
            let month = (currentTime.getMonth() + 1).toString().padStart(2, '0');
            let day = currentTime.getDate().toString().padStart(2, '0');
            let hours = currentTime.getHours().toString().padStart(2, '0');
            let minutes = currentTime.getMinutes().toString().padStart(2, '0');
            let seconds = currentTime.getSeconds().toString().padStart(2, '0');

            document.getElementById('time').textContent =
                `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 页面加载时更新时间
        window.onload = updateSanFranciscoTime;
        // 每秒更新时间
        setInterval(updateSanFranciscoTime, 1000);
    </script>
</body>
</html>
