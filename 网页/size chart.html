<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>专业表格图片生成器</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome/css/font-awesome.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(120deg, #b5fffc 0%, #88d3ce 100%);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      box-sizing: border-box;
      max-width: 1000px;
      width: 98vw;
      margin: 3.5rem auto 2.5rem auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      box-shadow: 0 16px 38px 0 rgba(44, 62, 80, 0.14),
        0 1.5px 12px 0 rgba(44, 62, 80, 0.02);
      padding: 2.8rem 2.2rem 2.2rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(7px);
      position: relative;
    }

    h2 {
      color: #10556d;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: left;
      margin-bottom: 1.35rem;
      margin-top: 0.3rem;
      width: 100%;
      position: relative;
      padding-bottom: 0.6rem;
      user-select: none;
    }

    h2::before {
      content: '';
      display: block;
      position: absolute;
      left: 0;
      bottom: 0;
      width: 72px;
      height: 4px;
      border-radius: 2px 2px 0 0;
      background: linear-gradient(90deg, #3eb5db 0%, #4dde9f 100%);
      opacity: 0.8;
    }

    /* 画布尺寸选项 */
    #canvas-size-options {
      margin-bottom: 1rem;
      text-align: left;
      width: 100%;
      font-size: 1.07rem;
      color: #29868b;
      background: rgba(207, 247, 244, 0.36);
      border-radius: 7px;
      padding: 0.39em 1.1em;
      box-sizing: border-box;
      font-weight: 500;
    }
    #canvas-size-options label {
      margin-right: 1.7em;
      cursor: pointer;
      user-select: none;
    }
    #canvas-size-options input[type='radio'] {
      vertical-align: middle;
      accent-color: #3eb5db;
    }
    #canvas-size-options input[type='number'] {
      width: 90px;
      padding: 2px 6px;
      margin: 0 4px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.95rem;
    }

    /* 语言选项 */
    #lang-options {
      width: 100%;
      margin-bottom: 0.7rem;
      text-align: left;
      font-size: 1.04rem;
      color: #256a62;
      background: rgba(207,247,244,0.27);
      border-radius: 7px;
      padding: 0.20em 1.1em 0.18em 1.1em;
      box-sizing: border-box;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 1.3em;
    }
    #lang-options label {
      cursor: pointer;
      user-select: none;
    }
    #lang-options input[type='checkbox'] {
      accent-color: #16a085;
      vertical-align: middle;
      margin-right: 0.3em;
    }

    /* 新增：颜色方案选择器样式 */
    #color-themes {
      width: 100%;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 0.5rem;
      box-sizing: border-box;
    }
    .theme-label {
      font-size: 1.05rem;
      color: #256a62;
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      position: relative;
    }
    .theme-btn:hover {
      transform: scale(1.15);
    }
    .theme-btn.active {
      transform: scale(1.2);
      box-shadow: 0 0 0 3px #3eb5db; /* 选中时的外圈 */
    }
    .theme-btn::after {
      /* 用于显示hover时的提示文字 */
      content: attr(title);
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .theme-btn:hover::after {
      opacity: 1;
    }

    textarea {
      width: 100%;
      max-width: 730px;
      height: 144px;
      font-family: 'Consolas', monospace;
      font-size: 17px;
      padding: 1.1rem 1rem 1rem 1.7rem;
      border: 2px solid #baebea;
      border-radius: 14px;
      background: #f7fcfc;
      box-shadow: 0 2px 18px rgba(64, 192, 192, 0.07);
      outline: none;
      transition: border 0.17s, box-shadow 0.22s;
      margin-bottom: 1rem;
      color: #30525f;
      resize: vertical;
    }

    textarea:focus {
      border: 2.5px solid #21bfae;
      box-shadow: 0 4px 20px rgba(34, 193, 195, 0.14);
    }

    #controls {
      margin: 1.5rem 0 1.7rem 0;
      display: flex;
      gap: 1.1rem;
      justify-content: flex-start;
      width: 100%;
      flex-wrap: wrap;
    }

    button {
      padding: 0.75rem 2.1rem 0.75rem 1.5rem;
      border: none;
      border-radius: 32px;
      font-size: 1.08rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.23s cubic-bezier(0.7, 0.2, 0.1, 1.0);
      letter-spacing: 1.4px;
      background: linear-gradient(90deg, #3eb5db 0%, #50dbbe 100%);
      color: white;
      box-shadow: 0 4px 14px rgba(63, 188, 187, 0.08);
      display: flex;
      align-items: center;
    }
    button:hover {
      background: linear-gradient(90deg, #22a4b8 0%, #44c59e 100%);
      box-shadow: 0 6px 24px rgba(34, 193, 195, 0.12);
      transform: translateY(-3px) scale(1.035);
    }
    button:active {
      transform: scale(0.97);
    }
    button:disabled {
      opacity: 0.71;
      background: linear-gradient(90deg, #adb5bd 0%, #bccfcc 100%);
      cursor: not-allowed;
    }
    button#btnDownload {
      background: linear-gradient(90deg, #49d688 0%, #23c491 100%);
      box-shadow: 0 4px 14px rgba(72, 214, 136, 0.09);
    }
    button#btnCopy {
      background: linear-gradient(90deg, #f39c12 0%, #e67e22 100%);
      box-shadow: 0 4px 14px rgba(243, 156, 18, 0.09);
    }
    button .fa {
      margin-right: 11px;
      font-size: 1.14em;
    }

    canvas {
      margin-top: 0.5rem;
      max-width: 100%;
      width: 99%;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 27px 0 rgba(102, 190, 205, 0.09),
        0 1.5px 12px 0 rgba(130, 250, 210, 0.04);
      border: 3.5px solid #e7fdfa;
      display: block;
      outline: none;
      transition: box-shadow 0.22s;
    }

    #copyToast {
      visibility: hidden;
      min-width: 220px;
      background-color: rgba(39, 174, 96, 0.95);
      color: white;
      text-align: center;
      border-radius: 12px;
      padding: 18px;
      position: fixed;
      z-index: 1000;
      left: 50%;
      bottom: 50px;
      transform: translateX(-50%);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transition: opacity 0.5s, bottom 0.5s, visibility 0.5s;
      display: flex;
      align-items: center;
      font-size: 17px;
      font-weight: 500;
      animation: pulse 2s infinite;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.3);
    }
    #copyToast.show { visibility: visible; opacity: 1; bottom: 70px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>专业表格图片生成器</h2>

    <!-- 画布尺寸选项 -->
    <div id="canvas-size-options">
      <label>
        <input type="radio" name="canvas-size" value="1600x1000" />
        1600 x 1000
      </label>
      <label>
        <input type="radio" name="canvas-size" value="original" checked />
        2670 x 1375
      </label>
      <label>
        <input type="radio" name="canvas-size" value="2900x1300" />
        2900 x 1300
      </label>
      <label>
        <input type="radio" name="canvas-size" value="custom" id="customRadio" />
        自定义:
        <input type="number" id="customWidth" placeholder="宽(px)" />
        x
        <input type="number" id="customHeight" placeholder="高(px)" />
      </label>
    </div>

    <!-- 语言选项 -->
    <div id="lang-options">
      <label>
        <input type="checkbox" id="deLang" />
        <span>德语表头</span>
      </label>
    </div>

    <!-- 新增：色彩方案选择 -->
    <div id="color-themes">
      <span class="theme-label">配色方案:</span>
      <!-- 按钮由 JS 动态生成或在这里静态写好，这里用静态方便查看结构，JS会绑定事件 -->
      <div class="theme-btn active" data-theme="0" title="原版 (深灰蓝)" style="background: #2c3e50;"></div>
      <div class="theme-btn" data-theme="1" title="暖棕色 (优雅)" style="background: #6d4c41;"></div>
      <div class="theme-btn" data-theme="2" title="商务蓝 (经典)" style="background: #1565c0;"></div>
      <div class="theme-btn" data-theme="3" title="森林绿 (自然)" style="background: #2e7d32;"></div>
      <div class="theme-btn" data-theme="4" title="典雅紫 (高级)" style="background: #6a1b9a;"></div>
    </div>

    <!-- 表格输入 -->
    <textarea id="inputText">Size	Bust	Shoulder	Length
M	110cm/43.31''	44cm/17.32''	76cm/29.92''
L	118cm/46.46''	46cm/18.11''	78cm/30.71''
XL	128cm/50.39''	49cm/19.29''	80.5cm/31.69''
XXL	138cm/54.33''	52cm/20.47''	83cm/32.68''
XXXL	148cm/58.27''	55cm/21.65''	85.5cm/33.66''</textarea>
    <div id="controls">
      <button id="btnRender"><i class="fa fa-magic"></i>生成图片</button>
      <button id="btnDownload" disabled><i class="fa fa-download"></i>下载图片</button>
      <button id="btnCopy" disabled><i class="fa fa-copy"></i>复制图片</button>
    </div>
    <canvas id="canvas" width="2670" height="1375"></canvas>
  </div>
  <div id="copyToast"><div class="toast-icon">✅</div><div>图片已复制到剪切板！</div></div>

  <script>
    const textarea = document.getElementById('inputText');
    const btnRender = document.getElementById('btnRender');
    const btnDownload = document.getElementById('btnDownload');
    const btnCopy = document.getElementById('btnCopy');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const sizeRadios = document.getElementsByName('canvas-size');
    const copyToast = document.getElementById('copyToast');
    const deLangCheckbox = document.getElementById('deLang');
    const customRadio = document.getElementById('customRadio');
    const customWidth = document.getElementById('customWidth');
    const customHeight = document.getElementById('customHeight');
    const themeBtns = document.querySelectorAll('.theme-btn');

    // 德语映射表
    const deDict = { 'size': 'Größe','waist': 'Taille','hip': 'Hüfte','length': 'Länge','bust': 'Brustumfang','shoulder': 'Schulter','sleeve': 'Ärmel','chest': 'Brust','thigh': 'Oberschenkel','bottoms': 'Hosen','height': 'Körpergröße','weight': 'Gewicht','shoulders': 'Schulter','hips': 'Hüfte','inseam': 'Innenbeinlänge','arm': 'Arm','leg': 'Bein','foot': 'Fuß','collar': 'Kragen','cuff': 'Manschette','hem': 'Saum','width': 'Breite','shoulder width': 'Schulterbreite','rise': 'Leibhöhe','outseam': 'Außenbeinlänge','underbust': 'Unterbrust','s': 'S','m': 'M','l': 'L','xl': 'XL','xxl': 'XXL','xxxl': 'XXXL' };

    // --- 新增：色彩方案配置 ---
    const themes = [
      // 0: 原版 (深蓝灰)
      {
        headerBg: '#2c3e50',
        rowOdd: '#f8f9fa',
        rowEven: '#e9ecef',
        headerText: '#ffffff',
        rowText: '#2d3436'
      },
      // 1: 暖棕色 (棕色系 - Brownish)
      {
        headerBg: '#725c47',
        rowOdd: '#efebe9', // 极浅的棕色
        rowEven: '#d7ccc8', // 浅拿铁色
        headerText: '#ffffff',
        rowText: '#3e2723'
      },
      // 2: 商务蓝 (Classic Corporate)
      {
        headerBg: '#1565c0',
        rowOdd: '#e3f2fd',
        rowEven: '#bbdefb',
        headerText: '#ffffff',
        rowText: '#0d47a1'
      },
      // 3: 森林绿 (Nature)
      {
        headerBg: '#2e7d32',
        rowOdd: '#e8f5e9',
        rowEven: '#c8e6c9',
        headerText: '#ffffff',
        rowText: '#1b5e20'
      },
      // 4: 典雅紫 (Creative/Modern)
      {
        headerBg: '#6a1b9a',
        rowOdd: '#f3e5f5',
        rowEven: '#e1bee7',
        headerText: '#ffffff',
        rowText: '#4a148c'
      }
    ];

    let currentThemeIndex = 0;

    // 绑定颜色切换事件
    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        // 移除所有active状态
        themeBtns.forEach(b => b.classList.remove('active'));
        // 激活当前按钮
        btn.classList.add('active');
        // 更新当前主题索引
        currentThemeIndex = parseInt(btn.getAttribute('data-theme'));
        // 立即重新渲染
        updateCanvasSizeAndRender();
      });
    });

    function getSelectedSize() {
      for (const radio of sizeRadios) {
        if (radio.checked) {
          if (radio.value === '1600x1000') return { w: 1600, h: 1000 };
          else if (radio.value === '2900x1300') return { w: 2900, h: 1300 };
          else if (radio.value === 'custom') {
            const w = parseInt(customWidth.value) || 1000;
            const h = parseInt(customHeight.value) || 1000;
            return { w, h };
          }
          else return { w: 2670, h: 1375 };
        }
      }
      return { w: 2670, h: 1375 };
    }

    function translateHeaderToGerman(headerRow) {
      return headerRow.map(cell => {
        let key = cell.replace(/[^a-zA-Z]/g, '').toLowerCase();
        if (cell.trim().toLowerCase() === 'shoulder width') { key = 'shoulder width'; }
        return deDict[key] || cell;
      });
    }

    function showCopySuccess() {
      copyToast.classList.add('show');
      setTimeout(() => copyToast.classList.remove('show'), 3000);
    }

    function updateCanvasSizeAndRender() {
      const { w, h } = getSelectedSize();
      canvas.width = w; canvas.height = h;
      renderTable(textarea.value, deLangCheckbox.checked);
    }

    function renderTable(text, isGermanHeader) {
      const rows = text.trim().split('\n').map(line => line.trim().split(/\t| {2,}/).map(cell => cell.trim()));
      if (rows.length === 0) return;
      if (isGermanHeader) rows[0] = translateHeaderToGerman(rows[0]);

      const R = rows.length, C = rows[0].length;
      const W = canvas.width, H = canvas.height;
      const rowH = H / R;
      const colWidths = []; colWidths[0] = W * 0.15; for (let c = 1; c < C; c++) colWidths[c] = (W * 0.85) / (C - 1);
      const colOffsets = []; colOffsets[0] = 0; for (let c = 1; c < C; c++) colOffsets[c] = colOffsets[c - 1] + colWidths[c - 1];

      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      let fontSize = Math.floor(rowH * 0.7);
      while (fontSize > 6) {
        ctx.font = `${fontSize}px Arial`; let ok = true;
        for (let r = 0; r < R && ok; r++) for (let c = 0; c < C; c++) if (ctx.measureText(rows[r][c]).width > colWidths[c] * 0.8) { ok = false; break; }
        if (ok) break; fontSize--;
      }
      ctx.font = `${fontSize}px Arial`;

      // 获取当前颜色主题
      const theme = themes[currentThemeIndex];

      for (let r = 0; r < R; r++) {
        const y = r * rowH;

        // 背景色逻辑
        if (r === 0) {
            ctx.fillStyle = theme.headerBg;
        } else {
            ctx.fillStyle = r % 2 ? theme.rowOdd : theme.rowEven;
        }

        ctx.fillRect(0, y, W, rowH);

        for (let c = 0; c < C; c++) {
          // 文字颜色逻辑
          ctx.fillStyle = r === 0 ? theme.headerText : theme.rowText;

          const x = colOffsets[c] + colWidths[c] / 2;
          ctx.fillText(rows[r][c], x, y + rowH / 2);
        }
      }

      // 边框线颜色 (保持白色，因为在所有背景色上白色都比较和谐，或者看起来像间隔)
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      for (let r = 0; r <= R; r++) { const y = r * rowH; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      for (let c = 0; c <= C; c++) { const x = c === 0 ? 0 : colOffsets[c]; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    }

    btnRender.addEventListener('click', () => { updateCanvasSizeAndRender(); btnDownload.disabled = false; btnCopy.disabled = false; });
    btnDownload.addEventListener('click', () => { const link = document.createElement('a'); link.download = 'table.png'; link.href = canvas.toDataURL('image/png'); link.click(); });
    btnCopy.addEventListener('click', async () => { try { canvas.toBlob(async (blob) => { await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]); showCopySuccess(); }); } catch (err) { alert('复制失败: ' + err); } });

    customWidth.addEventListener('input', () => { customRadio.checked = true; });
    customHeight.addEventListener('input', () => { customRadio.checked = true; });

    updateCanvasSizeAndRender();
  </script>
</body>
</html>
